<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<article data-testid="test-todo-card" class="card">

  <h2 data-testid="test-todo-title">Finish HNG Task</h2>

  <p data-testid="test-todo-description">
    Complete the frontend todo card assignment with accessibility and testing.
  </p>

  <span data-testid="test-todo-priority" class="priority high">High</span>

  <p>
    <time data-testid="test-todo-due-date" datetime="2026-04-16">
      Due April 16, 2026
    </time>
  </p>

  <p data-testid="test-todo-time-remaining" id="timeRemaining"></p>

  <p data-testid="test-todo-status" id="status">Pending</p>

  <label>
    <input 
      type="checkbox" 
      data-testid="test-todo-complete-toggle" 
      id="checkbox"
    />
    Mark as complete
  </label>

  <div data-testid="test-todo-tags">
    <span data-testid="test-todo-tag-work" class="tag">Work</span>
    <span data-testid="test-todo-tag-urgent" class="tag urgent">Urgent</span>
  </div>

  <div class="actions">
    <button data-testid="test-todo-edit-button">Edit</button>
    <button data-testid="test-todo-delete-button">Delete</button>
  </div>

</article>

<script src="script.js"></script>
</body>
</html>
