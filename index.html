<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card Stage 1a</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<article data-testid="test-todo-card" class="card">

  <h2 data-testid="test-todo-title">Frontend Task</h2>

  <p data-testid="test-todo-description">
    Build an advanced interactive todo card.
  </p>

  <!-- PRIORITY (FIXED TESTID ISSUE) -->
  <span 
    data-testid="test-todo-priority"
    data-priority="medium"
    id="priority">
    Medium
  </span>

  <!-- DUE DATE -->
  <time data-testid="test-todo-due-date" id="dueDate">
    Due 2026-04-16
  </time>

  <!-- TIME -->
  <p 
    data-testid="test-todo-time-remaining"
    aria-live="polite"
    id="timeRemaining"></p>

  <p data-testid="test-todo-overdue-indicator" id="overdue"></p>

  <!-- STATUS -->
  <p data-testid="test-todo-status" id="status">Pending</p>

  <!-- CHECKBOX -->
  <label>
    <input type="checkbox" data-testid="test-todo-complete-toggle" id="checkbox"/>
    Mark complete
  </label>

  <!-- STATUS CONTROL -->
  <label for="statusControl">Status</label>
  <select id="statusControl" data-testid="test-todo-status-control">
    <option>Pending</option>
    <option>In Progress</option>
    <option>Done</option>
  </select>

  <!-- EXPAND -->
  <button
    type="button"
    data-testid="test-todo-expand-toggle"
    aria-expanded="false"
    aria-controls="collapseBox"
    id="expandBtn">
    Expand
  </button>

  <div
    id="collapseBox"
    data-testid="test-todo-collapsible-section"
    style="display:none;">
    <p>Extra details here...</p>
  </div>

  <!-- ACTIONS -->
  <div class="actions">

    <button type="button" data-testid="test-todo-edit-button" id="editBtn">
      Edit
    </button>

    <button type="button" data-testid="test-todo-delete-button" id="deleteBtn">
      Delete
    </button>

  </div>

  <!-- EDIT FORM -->
  <section
    data-testid="test-todo-edit-form"
    id="editForm"
    hidden>

    <label for="editTitle">Title</label>
    <input id="editTitle" data-testid="test-todo-edit-title-input" />

    <label for="editDescription">Description</label>
    <textarea id="editDescription" data-testid="test-todo-edit-description-input"></textarea>

    <label for="editPriority">Priority</label>
    <select id="editPriority" data-testid="test-todo-edit-priority-select">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label for="editDue">Due Date</label>
    <input type="date" id="editDue" data-testid="test-todo-edit-due-date-input"/>

    <button type="button" data-testid="test-todo-save-button">Save</button>
    <button type="button" data-testid="test-todo-cancel-button">Cancel</button>

  </section>

</article>

<script src="script.js"></script>
</body>
</html>
